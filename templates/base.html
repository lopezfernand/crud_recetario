<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recetario</title>

  <!-- Bulma -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

  <style>
    :root{
      /* Paleta que ya te gustó */
      --brand-orange: #FF7A18;
      --brand-sky:    #3DA5FF;
      --bg-cream:     #FFF7EE;

      /* tonos de los botones/etiquetas */
      --pill-blue-bg:   #D9ECFF;
      --pill-blue-txt:  #0B6CC4;
      --pill-yellow-bg: #FFF1C2;
      --pill-yellow-txt:#7A5600;
      --pill-red-bg:    #FFD6D6;
      --pill-red-txt:   #8B1D1D;
    }

    body{
      background: radial-gradient(1200px 500px at 50% -200px, #ffffff 10%, var(--bg-cream) 60%, #fff 100%);
      min-height: 100vh;
    }

    .hero-bar{
      background: linear-gradient(90deg, var(--brand-sky) 0%, var(--brand-orange) 100%);
      height: 48px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .card-soft{
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
      padding: 24px;
    }

    .table thead th{
      background: #FDE4D6;  /* encabezado durazno */
      color: #4a4a4a;
      font-weight: 700;
    }

    /* --- Botones de acciones (misma paleta, mejor acomodo) --- */
    .actions-cell{
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
    }
    .btn{
      border: none;
      border-radius: 10px;
      padding: .35rem .65rem;
      font-weight: 600;
      font-size: .85rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.05);
      transition: transform .05s ease, box-shadow .15s ease;
    }
    .btn:focus{ outline: none; box-shadow: 0 0 0 3px rgba(61,165,255,.25); }
    .btn:hover{ transform: translateY(-1px); }

    .btn-view{   background: var(--pill-blue-bg);   color: var(--pill-blue-txt); }
    .btn-edit{   background: var(--pill-yellow-bg); color: var(--pill-yellow-txt); }
    .btn-delete{ background: var(--pill-red-bg);    color: var(--pill-red-txt);  }

    /* Píldoras (categoría) */
    .pill{
      display:inline-block;
      padding:.25rem .5rem;
      border-radius:12px;
      font-size:.85rem;
      font-weight:600;
    }
    .pill-blue{ background: var(--pill-blue-bg); color: var(--pill-blue-txt); }

    /* Formularios inline para el botón Eliminar */
    .form-inline{ display:inline; margin:0; }
  </style>
</head>
<body>
  <div class="hero-bar"></div>

  <section class="section">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </section>
</body>
</html>
